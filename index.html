  <!-- 微信/QQ引导蒙层 -->
  <div id="wechat-mask">
    <div class="wechat-mask-pop">
      <div class="wechat-mask-header">
        <img class="wechat-mask-logo" src="/uploads/logo/20260701_5d0760e193ed2d5e.png" alt="App Logo"
             onerror="this.style.display='none'">
        <div class="wechat-mask-info">
          <p class="wechat-mask-title">请在浏览器中打开</p>
          <p class="wechat-mask-subtitle">当前环境无法直接下载</p>
        </div>
      </div>
      <div class="wechat-mask-steps">

      </div>

      <div class="wechat-mask-copy">
        <input id="wechat-url" type="text" readonly>
        <button id="wechat-copy-btn">复制</button>

    </div>

  <!-- 最终恶搞弹窗（朋友头像） -->
  <div id="friend-reveal">
    <div class="reveal-box">
      <img src="friend.jpg" alt="你的朋友" id="friend-img"
           onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23333%22 width=%22200%22 height=%22200%22/%3E%3Ctext fill=%22%23fff%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2218%22%3E朋友头像缺失%3C/text%3E%3C/svg%3E'">
      <h2>🎉 恭喜你 🎉</h2>
      <p>系统已为您匹配到 <strong id="friend-name" style="color:#ff4081;">[性感小野猫-起床困难户]</strong></p>
    </div>
  </div>

  <script>
    (function(){
      // 微信/QQ引导蒙层
      var ua = navigator.userAgent.toLowerCase();
      if (/micromessenger|qq\/|qzone|weibo/i.test(ua)) {
        document.getElementById('wechat-mask').style.display = 'flex';
        if (/iphone|ipad|ipod/i.test(ua)) {
          document.getElementById('open-tip').textContent = '"在Safari中打开"';
        }
        var urlInput = document.getElementById('wechat-url');
        urlInput.value = window.location.href;
        document.getElementById('wechat-copy-btn').addEventListener('click', function() {
          urlInput.select();
          urlInput.setSelectionRange(0, 99999);
          try {
            navigator.clipboard.writeText(urlInput.value).then(function() {
              alert('链接已复制，请打开浏览器粘贴访问');
            });
          } catch(e) {
            document.execCommand('copy');
            alert('链接已复制，请打开浏览器粘贴访问');
          }
        });
      }
    })();

    // 问答数据（保留原风格，你可以修改问题文案）
    var questions = [
      {
        q: "温馨提示",
        d: "你即将看到当地寻找约会或兼职的女孩，您能否保密不泄露女孩隐私？\n\n约会之前，我们需要问几个简短问题?",
        ok: [0,1],
        a: ["好的","我不愿意"]
      },
      { q: "你是否已满23岁？", d: "仅限成年人", ok: [0,1], a: ["是","否"] },
      { q: "您是否有约炮需求？", d: "请选择", ok: [0,1], a: ["是","否"] },
      { q: "能否接受只进入身体，不介入生活？", d: "请选择", ok: [0,1], a: ["可以","不接受"] },
      { q: "你更想认识哪类？", d: "请选择", type:"img", ok: [0,1], imgs: ["/BL-JS-52/uploads/r1.js","/BL-JS-52/uploads/r2.js"] },
      { q: "你更喜欢哪种奶子？", d: "请选择", type:"img", ok: [0,1], imgs: ["/BL-JS-52/uploads/t1.js","/BL-JS-52/uploads/t2.js"] },
      { q: "你更偏好哪种逼型？", d: "请选择", type:"img", ok: [0,1], imgs: ["/BL-JS-52/uploads/b1.js","/BL-JS-52/uploads/b2.js"] },
      { q: "您所在地区有68 位性感女性正在等着与您见面！", d: "下载APP后即可寻找你心中的妹妹", ok: [0,1], a: ["继续","退出"] }
    ];

    var qi = 0;
    var qTitle = document.getElementById("qTitle");
    var qDesc = document.getElementById("qDesc");
    var qOptions = document.getElementById("qOptions");
    var progressBar = document.getElementById("progressBar");

    function render() {
      var q = questions[qi];
      if (!q || !qTitle) return;
      qTitle.innerText = q.q;
      qDesc.innerText = q.d;
      progressBar.style.width = ((qi+1)/questions.length*100) + "%";
      qOptions.innerHTML = "";
      qOptions.className = q.type === "img" ? "img-options" : "options";
      if (q.type === "img") {
        q.imgs.forEach(function(src, i) {
          var d = document.createElement("div");
          d.className = "img-option";
          d.innerHTML = '<img src="'+src+'" onerror="this.style.background=\'#333\'">';
          d.onclick = function() { choose(i); };
          qOptions.appendChild(d);
        });
      } else {
        q.a.forEach(function(t, i) {
          var d = document.createElement("div");
          d.className = "option";
          d.innerText = t;
          d.onclick = function() { choose(i); };
          qOptions.appendChild(d);
        });
      }
    }

    function choose(i) {
      if (questions[qi].ok.indexOf(i) === -1) {
        document.getElementById("popup").style.display = "flex";
        return;
      }
      if (qi === 0) {
        // 第一题答完后显示倒计时过渡
        qTitle.innerText = "";
        qDesc.innerText = "";
        qOptions.innerHTML = '<div style="text-align:center;margin-bottom:14px">'
          + '<h2 style="margin:0 0 6px;font-size:22px;font-weight:800;color:#ff4081;letter-spacing:1px">'
          + '》》》进入挑选女孩环节》》》</h2>'
          + '<h3 style="margin:0;font-size:15px;font-weight:500;color:#666">请认真对待，以便系统推荐</h3>'
          + '</div><div class="countdown-bar"><span id="countdownSpan"></span></div>';
        setTimeout(function() {
          var bar = document.getElementById("countdownSpan");
          if (bar) bar.style.width = "100%";
        }, 50);
        setTimeout(function() {
          qi++;
          render();
        }, 2000);
        return;
      }
      qi++;
      if (qi >= questions.length) {
        // 答完所有题 → 隐藏问答层，显示朋友头像
        document.getElementById("qa-layer").style.display = "none";
        document.getElementById("friend-reveal").style.display = "flex";
      } else {
        render();
      }
    }

    function restart() {
      document.getElementById("popup").style.display = "none";
      qi = 0;
      render();
    }

    // 下载按钮（如果没走到问答直接点，也触发恶搞弹窗，保持整蛊）
    document.getElementById('downloadBtn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById("qa-layer").style.display = "none";
      document.getElementById("friend-reveal").style.display = "flex";
    });

    // 初始化问答
    document.addEventListener("DOMContentLoaded", function() {
      render();
    });
  </script>
