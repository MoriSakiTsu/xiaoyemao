<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>验证您已满18岁</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#111; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    #qa-card {
      background:#1c1c1e; border-radius:24px; padding:24px 20px;
      width:90%; max-width:380px; box-shadow:0 0 30px rgba(255,64,129,0.15);
    }
    .progress-text { font-size:13px; color:#999; margin-bottom:8px; }
    .progress-bar { background:#333; height:6px; border-radius:3px; margin-bottom:24px; overflow:hidden; }
    .progress-bar span { display:block; height:100%; width:0%; background:#ff4081; transition:width 0.3s; }
    #qTitle { font-size:22px; font-weight:bold; color:#fff; margin-bottom:12px; }
    #qDesc { font-size:15px; color:#aaa; margin-bottom:22px; white-space:pre-line; }
    .options { display:flex; flex-direction:column; gap:10px; }
    .option {
      background:#2c2c2e; padding:14px; border-radius:12px;
      text-align:center; font-weight:bold; color:#fff; cursor:pointer;
      transition: background 0.2s;
    }
    .option:active { background:#ff4081; }
    .img-options { display:flex; gap:10px; }
    .img-option { flex:1; border-radius:12px; overflow:hidden; cursor:pointer; }
    .img-option img { width:100%; display:block; }
    /* 倒计时条 */
    .countdown-bar { background:#333; height:8px; border-radius:4px; margin-top:10px; }
    .countdown-bar span { display:block; width:0%; height:100%; background:#ff4081; border-radius:4px; transition:width 1.8s linear; }
    /* 错误弹窗 */
    #popup {
      position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7);
      display:none; align-items:center; justify-content:center;
    }
    .popup-box {
      background:#1c1c1e; border-radius:20px; padding:24px;
      text-align:center; width:80%; max-width:300px;
    }
    .popup-box h2 { color:#ff4081; margin-bottom:10px; }
    .popup-box button {
      background:#ff4081; border:none; color:#fff; padding:10px 30px;
      border-radius:20px; margin-top:14px; font-size:16px; cursor:pointer;
    }
    /* 最终头像弹窗 */
    #friend-reveal {
      position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.92);
      display:none; align-items:center; justify-content:center;
    }
    .reveal-box {
      text-align:center; padding:20px;
    }
    .reveal-box img {
      width:200px; height:200px; border-radius:50%; border:4px solid #ff4081;
      object-fit:cover; margin-bottom:20px;
    }
    .reveal-box h2 { color:#ff4081; font-size:28px; margin-bottom:10px; }
    .reveal-box p { color:#fff; font-size:20px; }
  </style>
</head>
<body>

  <!-- 问答卡片 -->
  <div id="qa-card">
    <div class="progress-text" id="progressText"></div>
    <div class="progress-bar"><span id="progressBar"></span></div>
    <h1 id="qTitle"></h1>
    <p id="qDesc"></p>
    <div id="qOptions"></div>
  </div>

  <!-- 答题错误弹窗 -->
  <div id="popup">
    <div class="popup-box">
      <h2>❌ 答题不符合要求</h2>
      <p>请重新答题</p>
      <button onclick="restart()">重新答题</button>
    </div>
  </div>

  <!-- 最终弹窗（头像） -->
  <div id="friend-reveal">
    <div class="reveal-box">
      <img src="friend.jpg" alt="你的朋友" id="friend-img"
           onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23333%22 width=%22200%22 height=%22200%22/%3E%3Ctext fill=%22%23fff%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2218%22%3E朋友头像缺失%3C/text%3E%3C/svg%3E'">
      <h2>🎉 恭喜你 🎉</h2>
      <p>系统已为您匹配到 <strong id="friend-name" style="color:#ff4081;">[性感小野猫-起床困难户]</strong></p>
    </div>
  </div>

  <script>
    // 问答数据
    var questions = [
      {
        q: "温馨提示",
        d: "你即将看到当地寻找约会或兼职的女孩，您能否保密不泄露女孩隐私？\n\n约会之前，我们需要问几个简短问题",
        ok: [0,1],
        a: ["好的","我不愿意"]
      },
      { q: "你是否已满23岁？", d: "仅限成年人", ok: [0,1], a: ["是","否"] },
      { q: "您是否有月抛需求？", d: "请选择", ok: [0,1], a: ["是","否"] },
      { q: "能否接受只进入身体，不介入生活？", d: "请选择", ok: [0,1], a: ["可以","不接受"] },
      { q: "你更想认识哪类？", d: "请选择", type:"img", ok: [0,1], imgs: ["/BL-JS-52/uploads/r1.js","/BL-JS-52/uploads/r2.js"] },
      { q: "你接受好女孩吗？", d: "请选择", ok: [0,1], a: ["可以","不接受"] },
      { q: "您所在地区有68 位性感女性正在等着与您见面！", d: "下载QQ APP后即可寻找你心中的妹妹", ok: [0,1], a: ["继续","退出"] }
    ];

    var qi = 0;
    var qTitle = document.getElementById("qTitle");
    var qDesc = document.getElementById("qDesc");
    var qOptions = document.getElementById("qOptions");
    var progressBar = document.getElementById("progressBar");
    var progressText = document.getElementById("progressText");

    function render() {
      var q = questions[qi];
      if (!q || !qTitle) return;
      qTitle.innerText = q.q;
      qDesc.innerText = q.d;
      progressText.innerText = (qi+1) + "/" + questions.length;
      progressBar.style.width = ((qi+1)/questions.length*100) + "%";
      qOptions.innerHTML = "";
      qOptions.className = q.type === "img" ? "img-options" : "options";
      if (q.type === "img") {
        q.imgs.forEach(function(src, i) {
          var d = document.createElement("div");
          d.className = "img-option";
          d.innerHTML = '<img src="'+src+'" onerror="this.style.background=\'#333\'">';
          d.onclick = function() { choose(i); };
          qOptions.appendChild(d);
        });
      } else {
        q.a.forEach(function(t, i) {
          var d = document.createElement("div");
          d.className = "option";
          d.innerText = t;
          d.onclick = function() { choose(i); };
          qOptions.appendChild(d);
        });
      }
    }

    function choose(i) {
      if (questions[qi].ok.indexOf(i) === -1) {
        document.getElementById("popup").style.display = "flex";
        return;
      }
      if (qi === 0) {
        // 第一题答完后倒计时过渡
        qTitle.innerText = "";
        qDesc.innerText = "";
        qOptions.innerHTML = '<div style="text-align:center;margin-bottom:14px">'
          + '<h2 style="margin:0 0 6px;font-size:22px;font-weight:800;color:#ff4081;letter-spacing:1px">'
          + '》》》进入挑选女孩环节》》》</h2>'
          + '<h3 style="margin:0;font-size:15px;font-weight:500;color:#666">请认真对待，以便系统推荐</h3>'
          + '</div><div class="countdown-bar"><span id="countdownSpan"></span></div>';
        setTimeout(function() {
          var bar = document.getElementById("countdownSpan");
          if (bar) bar.style.width = "100%";
        }, 50);
        setTimeout(function() {
          qi++;
          render();
        }, 2000);
        return;
      }
      qi++;
      if (qi >= questions.length) {
        // 答完所有题 → 显示头像
        document.getElementById("qa-card").style.display = "none";
        document.getElementById("friend-reveal").style.display = "flex";
      } else {
        render();
      }
    }

    function restart() {
      document.getElementById("popup").style.display = "none";
      qi = 0;
      render();
    }

    // 启动
    render();
  </script>
</body>
</html>
